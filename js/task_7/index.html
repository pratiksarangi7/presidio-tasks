<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        .chatlist {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
        }

        .sent-message {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
            font-size: 20px;
            font-size: 20px;
            padding: 4px 5px;
            border-radius: 5px;

        }

        .received-message {
            align-self: flex-start;
            background-color: #e9e9eb;
            color: black;
            font-size: 20px;
            padding: 4px 5px;
            border-radius: 5px;

        }

        .textarea {
            display: flex;
            gap: 10px;
            padding-top: 20px;
        }

        #input {
            flex-grow: 1;
            padding: 8px;
        }
    </style>
</head>

<body>
    <div class="chatlist" id="chatlist">
        <div class="sent-message">
            hello!
        </div>
        <div class="received-message">hi!</div>
    </div>
    <div class="textarea">
        <input type="text" name="input" id="input">
        <button id="send">send</button>
    </div>
    <script src="script.js"></script>
</body>

</html>

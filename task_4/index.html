<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Drop Down</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #333;
        }

        .menu {
            list-style: none;
            display: flex;
        }

        .menu li {
            position: relative;
        }

        .menu li a {
            display: block;
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            transition: background 0.3s;
        }

        .menu li a:hover {
            background-color: #555;
        }

        .submenu {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #444;
            list-style: none;
            min-width: 160px;

            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .submenu li a {
            padding: 12px 15px;
            font-size: 14px;
        }

        .dropdown:hover .submenu {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .menu {
                flex-direction: column;
            }

            .submenu {
                position: static;
                display: none;
                opacity: 1;
                visibility: visible;
                transform: none;
                background-color: #222;
            }

            .dropdown:hover .submenu {
                display: block;
            }

            .menu li a {
                border-bottom: 1px solid #444;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li class="dropdown">
                <a href="#" class="dropbtn">Services &#9662;</a>
                <ul class="submenu">
                    <li><a href="#">Web Design</a></li>
                    <li><a href="#">SEO</a></li>
                    <li><a href="#">Marketing</a></li>
                </ul>
            </li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</body>

</html>

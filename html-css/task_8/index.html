<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .accordion {
            max-width: 600px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .accordion-toggle {
            display: none;
        }

        .accordion-header {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            background: #f8f9fa;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .accordion-header:hover {
            background: #eef1f4;
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
            overflow: hidden;
            background: #ffffff;
        }

        .content-inner {
            min-height: 0;
            padding: 0 1rem;
        }

        .accordion-toggle:checked~.accordion-content {
            grid-template-rows: 1fr;
        }

        .icon::after {
            content: '+';
            transition: transform 0.3s;
        }

        .accordion-toggle:checked+.accordion-header .icon::after {
            content: '-';
            transform: rotate(180deg);
        }
    </style>
</head>

<body>
    <div class="accordion">
        <div class="accordion-item">
            <input type="checkbox" id="section-1" class="accordion-toggle">
            <label for="section-1" class="accordion-header">
                Section 1: Click to Expand
                <span class="icon"></span>
            </label>
            <div class="accordion-content">
                <div class="content-inner">
                    <p>Content: Part:1.</p>
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <input type="checkbox" id="section-2" class="accordion-toggle">
            <label for="section-2" class="accordion-header">
                Section 2: Click to Expand
                <span class="icon"></span>
            </label>
            <div class="accordion-content">
                <div class="content-inner">
                    <p>Content part:2.</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
